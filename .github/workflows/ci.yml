name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: newsletter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newsletter
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/newsletter
      AUTH_USERNAME: ci-admin
      AUTH_PASSWORD: ci-password
      AUTH_SESSION_SECRET: ci-session-secret-change-me
      MAILCHIMP_ON_HOLD: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm --prefix dashboard ci

      - name: Lint
        run: npm --prefix dashboard run lint

      - name: Build
        run: npm --prefix dashboard run build
